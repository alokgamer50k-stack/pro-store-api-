<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProStore | Digital Assets</title>
    <style>
        :root { --cyan: #00f2fe; --purple: #d500f9; --bg: #050508; --glass: rgba(20,20,30,0.6); }
        
        /* APP FEEL & TEXT HIGHLIGHT BLOCKER */
        html, body {
            margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: #fff; min-height: 100vh;
            background-image: radial-gradient(circle at 15% 50%, rgba(0,242,254,0.1), transparent 30%); 
            background-attachment: fixed;
            overscroll-behavior-y: none; touch-action: pan-y;
            -webkit-tap-highlight-color: transparent !important; 
            -webkit-user-select: none !important; user-select: none !important;
        }

        input { -webkit-user-select: text !important; user-select: text !important; }
        *, *::before, *::after { box-sizing: inherit; }

        /* TAP RIPPLE EFFECT */
        .tap-ripple {
            position: fixed; border-radius: 50%; background: rgba(0, 242, 254, 0.4);
            transform: translate(-50%, -50%) scale(0); animation: rippleAnim 0.4s ease-out;
            pointer-events: none; z-index: 99999999; box-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
        }
        @keyframes rippleAnim { to { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }

        /* TOP NAV & 3 DOTS */
        nav { 
            display: flex; align-items: center; justify-content: space-between; 
            height: 75px; padding: 0 5%; background: rgba(10,10,15,0.95); 
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .logo { font-size:22px; font-weight:900; background:linear-gradient(90deg, var(--cyan), var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; cursor:pointer; }

        .search-bar { flex: 1; margin: 0 15px; display: flex; justify-content: center; }
        .search-bar input { width: 100%; max-width: 350px; padding: 10px 18px; border-radius: 25px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0,242,254,0.3); color: white; outline: none; transition: 0.3s; }
        .search-bar input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,242,254,0.3); background: rgba(0,242,254,0.05); }

        .nav-right { display: flex; align-items: center; gap: 10px; position: relative; }
        #top-pic { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--cyan); object-fit: cover; display: none; background: #222; }
        .three-dots { font-size:28px; font-weight:bold; cursor:pointer; color:#fff; background:none; border:none; padding:5px 10px; outline:none; }

        .dropdown { display:none; position:absolute; right:0; top:55px; background:#0a0a0f; border:1px solid var(--cyan); border-radius:12px; z-index:1001; overflow:hidden; width: 190px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .dropdown button { display:block; width:100%; padding:15px 20px; background:none; border:none; color:#fff; text-align:left; cursor:pointer; border-bottom:1px solid #222; font-size: 15px; font-weight: bold; }
        .dropdown button:hover { background:rgba(0,242,254,0.1); color:var(--cyan); }

        /* VIEWS & LAYOUT */
        #main-wrapper { padding-bottom: 40px; padding-top: 20px; }
        .view-section { display: none; max-width:1200px; margin:0 auto; padding:0 20px; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

        /* STORE GRID */
        .store-container { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:20px; }
        .card { background:var(--glass); border-radius:15px; padding:15px; border: 1px solid rgba(255,255,255,0.05); position:relative; overflow:hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s; }
        .card::after { content:''; position:absolute; top:0; left:-100%; width:50%; height:100%; background:linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent); transform:skewX(-20deg); animation:shine 3s infinite; pointer-events: none; }
        @keyframes shine { 0% {left:-100%;} 20% {left:200%;} 100% {left:200%;} }
        .img-box { width:100%; height:150px; background:#000; border-radius:10px; margin-bottom:12px; overflow:hidden; border: 1px solid rgba(255,255,255,0.02); }
        .img-box img { width:100%; height:100%; object-fit:cover; }
        .price { font-size:24px; color:var(--cyan); font-weight:900; margin:10px 0; text-shadow: 0 0 10px rgba(0,242,254,0.4); }

        /* BUTTONS */
        .btn { width:100%; padding:14px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; transition: 0.2s; position: relative; z-index: 10; }
        .btn-p { background: linear-gradient(90deg, var(--cyan), #0088ff); color:#000; box-shadow: 0 0 15px rgba(0,242,254,0.4); }
        .btn-f { background:rgba(255,255,255,0.05); color:#fff; border: 1px solid rgba(255,255,255,0.1); }

        /* AUTH & SETTINGS */
        .auth-box { max-width: 400px; margin: 20px auto; background: var(--glass); padding: 35px 25px; border-radius: 20px; border: 1px solid rgba(0,242,254,0.2); text-align: center; }
        .auth-input { width: 100%; padding: 14px 15px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px; outline: none; }
        .setting-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 18px 20px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); font-weight: 600; }

        /* MODALS */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index:10000; align-items:center; justify-content:center; padding:20px; }
        .m-content { background:#0d0d14; padding:25px; border-radius:20px; border:1px solid var(--cyan); width:100%; max-width:400px; text-align:center; max-height:90vh; overflow-y:auto; }

        @media (max-width: 600px) { 
            nav { height: auto; padding: 10px 5%; flex-direction: row; flex-wrap: wrap; }
            .search-bar { order: 3; width: 100%; margin: 10px 0 0 0; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="switchTab('store')">PRO STORE</div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search assets..." oninput="filterProducts()">
    </div>
    <div class="nav-right">
        <img id="top-pic" onclick="switchTab('settings')" src="" alt="">
        <button class="three-dots" id="dots" onclick="toggleMenu()">⋮</button>
        <div class="dropdown" id="menu">
            <button onclick="switchTab('store')">🏠 Home Store</button>
            <button onclick="switchTab('dash')">👤 User Dashboard</button>
            <button onclick="switchTab('settings')">⚙️ Settings</button>
        </div>
    </div>
</nav>

<div id="main-wrapper">
    <div id="view-store" class="view-section active">
        <div id="single-btn" style="text-align:center; margin-bottom:20px; display:none;"><button class="btn btn-p" style="width:auto; padding:10px 30px;" onclick="location.href=location.pathname">⬅ Back to Store</button></div>
        <div class="store-container" id="list"></div>
    </div>

    <div id="view-dash" class="view-section">
        <div class="auth-box" id="auth-form-container">
            <h2 style="color:var(--cyan); margin-bottom: 25px;">Secure Login</h2>
            <input type="text" id="u-name" class="auth-input" placeholder="Username">
            <input type="password" id="u-pass" class="auth-input" placeholder="Password">
            <button class="btn btn-p" onclick="userLogin()">Login / Register</button>
        </div>
        <div class="auth-box" id="welcome-container" style="display:none;">
            <img id="welcome-pic" src="" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--cyan); margin-bottom:20px; object-fit:cover;">
            <h2 style="color:var(--purple);">Welcome Back!</h2>
            <h1 id="welcome-name" style="text-transform:uppercase;"></h1>
            <button class="btn btn-f" style="border-color:#ff4444; color:#ff4444;" onclick="userLogout()">Logout</button>
        </div>
    </div>

    <div id="view-settings" class="view-section">
        <div style="max-width: 500px; margin: 0 auto;">
            <div style="text-align: center; margin-bottom: 35px;">
                <img id="set-pic" src="" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--cyan); object-fit:cover; margin: 0 auto 15px; display: block; background: #222;">
                <input type="file" id="pic-upload" accept="image/*" style="display: none;" onchange="updateProfilePic(event)">
                <button onclick="document.getElementById('pic-upload').click()" style="background:rgba(0,242,254,0.1); border:1px solid var(--cyan); color:var(--cyan); padding:10px 25px; border-radius:25px; font-weight:bold; cursor:pointer;">Change Photo</button>
            </div>
            <div class="setting-item" onclick="window.open('https://t.me/+CuAcIbBl-nk4MGQ1')"><span>✈️ Help Center</span><span>❯</span></div>
            <div class="setting-item" onclick="changeUserPass()"><span>🔑 Change Password</span><span>❯</span></div>
            <div class="setting-item" onclick="showUserFiles()"><span>📁 Your Files</span><span id="file-count" style="color:var(--cyan);">0</span></div>
            <div class="setting-item" onclick="checkServerStatus(true)"><span>📡 Server Status</span><span id="server-dot">Checking...</span></div>
            <div class="setting-item" style="margin-top:30px; border-color:rgba(255,0,0,0.3); color:#ff4444;" onclick="showM('admin-login')"><span>🛡️ Admin Access</span><span>❯</span></div>
        </div>
    </div>
</div>

<div id="admin-login" class="modal"><div class="m-content"><h2 style="color:#ff4444;">Admin System</h2><input type="password" id="pw" class="auth-input" placeholder="Passcode"><button class="btn btn-p" onclick="adminLogin()">Enter</button><button class="btn btn-f" onclick="closeM()">Cancel</button></div></div>

<div id="admin-dash" class="modal"><div class="m-content" style="text-align:left;"><h3>Upload Asset</h3><input id="t" class="auth-input" placeholder="Title"><input id="pr" class="auth-input" placeholder="Price"><input id="al" class="auth-input" placeholder="Ads Link"><input id="dl" class="auth-input" placeholder="Direct Link"><input type="file" id="imgf" style="margin:10px 0; color:#fff;"><button class="btn btn-p" onclick="add()">Publish Item</button><div id="admin-list" style="max-height:200px; overflow-y:auto; margin-top:10px;"></div><button class="btn btn-f" onclick="closeM()">Close</button></div></div>

<div id="pay-modal" class="modal"><div class="m-content"><h2 id="amt" style="color:#00ff88; font-size:45px;">₹0</h2><img id="qr" style="width:200px; height:200px; background:#fff; padding:8px; border-radius:10px; margin:15px 0;"><p>Awaiting Verification...</p><div id="ok" style="display:none;"><button class="btn btn-p" id="dl-btn">Unlock Now</button></div><button class="btn btn-f" onclick="closeM()">Cancel</button></div></div>

<div id="user-files-modal" class="modal"><div class="m-content"><h2>Your Collection</h2><div id="u-files-list" style="text-align:left; max-height:300px; overflow-y:auto;"></div><button class="btn btn-f" onclick="closeM()">Close</button></div></div>

<script>
const S_API = "https://pro-store-87h7.onrender.com"; 
const P_API = "https://payment-chacker-production-9bd7.up.railway.app";
const defaultAvatar = "https://api.dicebear.com/7.x/bottts/svg?seed=ProStoreAvatar&backgroundColor=1a1a24";

let currentUser = JSON.parse(localStorage.getItem('proStoreUser'));

// UI LOGIC
function toggleMenu() { 
    let m = document.getElementById('menu'); 
    m.style.display = m.style.display === 'block' ? 'none' : 'block'; 
}

document.addEventListener('click', function(e) {
    if (e.target.tagName !== 'INPUT' && e.target.id !== 'dots') {
        let ripple = document.createElement('div'); ripple.className = 'tap-ripple';
        ripple.style.left = e.clientX + 'px'; ripple.style.top = e.clientY + 'px';
        document.body.appendChild(ripple); setTimeout(() => ripple.remove(), 400);
    }
    let m = document.getElementById('menu');
    if (m && m.style.display === 'block' && e.target.id !== 'dots') m.style.display = 'none';
});

function switchTab(tab) {
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + tab).classList.add('active');
    checkUser();
}

function showM(id) { document.getElementById(id).style.display='flex'; }
function closeM() { document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }

// USER SYSTEM
function checkUser() {
    let tp = document.getElementById('top-pic'), sp = document.getElementById('set-pic'), wp = document.getElementById('welcome-pic');
    if(currentUser) {
        document.getElementById('auth-form-container').style.display = 'none'; 
        document.getElementById('welcome-container').style.display = 'block';
        document.getElementById('welcome-name').innerText = currentUser.name;
        document.getElementById('file-count').innerText = currentUser.files ? currentUser.files.length : 0;
        let pic = currentUser.pic || defaultAvatar;
        tp.src = pic; tp.style.display = 'block'; sp.src = pic; wp.src = pic;
    } else {
        document.getElementById('auth-form-container').style.display = 'block'; 
        document.getElementById('welcome-container').style.display = 'none';
        tp.style.display = 'none'; sp.src = defaultAvatar;
    }
}

function userLogin() {
    let n = document.getElementById('u-name').value, p = document.getElementById('u-pass').value;
    if(!n || !p) return alert("Fill all fields");
    currentUser = { name: n, pass: p, pic: '', files: [] };
    localStorage.setItem('proStoreUser', JSON.stringify(currentUser));
    switchTab('store');
}

function userLogout() { localStorage.removeItem('proStoreUser'); currentUser = null; checkUser(); switchTab('dash'); }

function updateProfilePic(e) {
    let r = new FileReader();
    r.onload = ev => { currentUser.pic = ev.target.result; localStorage.setItem('proStoreUser', JSON.stringify(currentUser)); checkUser(); };
    r.readAsDataURL(e.target.files[0]);
}

function showUserFiles() {
    let l = document.getElementById('u-files-list'); l.innerHTML = '';
    if(!currentUser.files || currentUser.files.length === 0) l.innerHTML = '<p>No files yet.</p>';
    else currentUser.files.forEach(f => { l.innerHTML += `<div class="setting-item" onclick="window.open('${f.link}')"><span>${f.title}</span><span style="color:var(--cyan);">Open ❯</span></div>`; });
    showM('user-files-modal');
}

// STORE & API
async function load() {
    checkUser();
    let container = document.getElementById('list');
    container.innerHTML = "Checking server...";
    try {
        let res = await fetch(S_API+'/api/products');
        let data = await res.json();
        container.innerHTML = "";
        data.reverse().forEach(p=>{
            container.innerHTML += `
            <div class="card" data-title="${p.title.toLowerCase()}">
                <div class="img-box"><img src="${p.img || ''}"></div>
                <h3>${p.title}</h3>
                <div class="price">₹${p.price}</div>
                <button class="btn btn-f" onclick="window.open('${p.adsLink}')">Free Download</button>
                <button class="btn btn-p" onclick="pay('${p.price}','${p.directLink}', '${p.title}')">Direct Unlock</button>
            </div>`;
        });
    } catch(e) { container.innerHTML = "Server Offline"; }
}

async function pay(p, link, title) {
    let amt = (parseFloat(p) + Math.random()).toFixed(2);
    document.getElementById('amt').innerText = '₹'+amt;
    document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent('upi://pay?pa=7906083504@fam&am='+amt+'&cu=INR')}`;
    showM('pay-modal');
    
    let check = setInterval(async () => {
        try {
            let r = await fetch(P_API+'/check-payment?amount='+amt);
            let d = await r.json();
            if(d.success) {
                clearInterval(check);
                document.getElementById('ok').style.display='block';
                if(currentUser) {
                    currentUser.files.push({title, link});
                    localStorage.setItem('proStoreUser', JSON.stringify(currentUser));
                }
                document.getElementById('dl-btn').onclick = () => { window.open(link); closeM(); };
            }
        } catch(e){}
    }, 5000);
}

function filterProducts() {
    let f = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => c.style.display = c.dataset.title.includes(f) ? "block" : "none");
}

async function checkServerStatus() {
    let dot = document.getElementById('server-dot');
    try { let res = await fetch(S_API+'/api/products'); dot.innerText = res.ok ? "🔵 Online" : "🔴 Offline"; } 
    catch(e) { dot.innerText = "🔴 Offline"; }
}

function adminLogin() { if(document.getElementById('pw').value==='alok123') { closeM(); showM('admin-dash'); loadAdmin(); } else alert("Wrong!"); }

async function add() {
    let file = document.getElementById('imgf').files[0];
    const send = (img) => fetch(S_API+'/api/products',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            title:document.getElementById('t').value,
            price:document.getElementById('pr').value,
            adsLink:document.getElementById('al').value,
            directLink:document.getElementById('dl').value,
            img:img
        })
    }).then(() => location.reload());

    if(file) { let r = new FileReader(); r.onload=e=>send(e.target.result); r.readAsDataURL(file); } else send('');
}

async function loadAdmin() {
    let res = await fetch(S_API+'/api/products');
    let data = await res.json();
    let l = document.getElementById('admin-list'); l.innerHTML = "";
    data.forEach(p => {
        l.innerHTML += `<div class="setting-item" style="font-size:12px;"><span>${p.title}</span><button onclick="del('${p.id}')" style="color:red; background:none; border:none;">Del</button></div>`;
    });
}

async function del(id) { if(confirm('Delete?')) { await fetch(S_API+'/api/products/'+id,{method:'DELETE'}); loadAdmin(); } }

window.onload = () => { load(); checkServerStatus(); };
</script>

</body>
</html>
